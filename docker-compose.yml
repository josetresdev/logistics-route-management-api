version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: logistics-postgres
    restart: always
    environment:
      POSTGRES_DB: logistics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - logistics_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build: .
    container_name: logistics-django
    command: >
      sh -c "sleep 10 && \
             python manage.py migrate --noinput && \
             python manage.py shell -c 'from django.contrib.auth import get_user_model; User = get_user_model();\nimport sys;\ntry:\n  if not User.objects.filter(username=\'admin\').exists():\n    User.objects.create_superuser(\'admin\', \'admin@local\', \'admin123\')\nexcept Exception as e:\n  print(e); sys.exit(1)' && \
             python manage.py drf_create_token admin || true && \
             gunicorn config.wsgi:application --bind 0.0.0.0:8080 --workers 4 --worker-class gthread --threads 2 --timeout 300 --graceful-timeout 60 --access-logfile logs/access.log --error-logfile logs/error.log"
    ports:
      - "8080:8080"
    environment:
      DEBUG: "True"
      SECRET_KEY: "django-insecure-development-key-change-in-production"
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: logistics
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DB_ENGINE: "django.db.backends.postgresql"
      DB_NAME: "logistics"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DJANGO_SETTINGS_MODULE: "config.settings"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  logistics_pgdata:
