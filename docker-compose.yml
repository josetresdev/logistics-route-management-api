services:

  django:
    build: .
    container_name: logistics-django
    restart: unless-stopped

    env_file:
      - .env

    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: logistics
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432

    extra_hosts:
      - "postgres:host-gateway"

    volumes:
      - ./logs:/app/logs
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./db/init.sql:/app/db/init.sql:ro

    ports:
      - "8080:8080"

    entrypoint: ["/app/entrypoint.sh"]
