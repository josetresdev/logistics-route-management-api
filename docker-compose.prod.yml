version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: logistics-db-prod
    environment:
      POSTGRES_DB: logistics
      POSTGRES_USER: ${DB_USER:postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: logistics-api-prod
    command: >
      sh -c "python manage.py migrate --noinput && \
             echo 'Intentando crear usuario admin...' && \
             python manage.py shell -c 'from django.contrib.auth import get_user_model; User = get_user_model(); import sys; try: \n  if not User.objects.filter(username=\'admin\').exists(): \n    User.objects.create_superuser(\'admin\', \'admin@local\', \'admin123\'); print(\'Usuario admin creado\') \n  else: print(\'Usuario admin ya existe\')\nexcept Exception as e: print(\'Error creando usuario admin:\', e); sys.exit(1)' && \
             echo 'Intentando crear token para admin...' && \
             python manage.py drf_create_token admin || true && \
             echo 'Arrancando Gunicorn...' && \
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --access-logfile logs/access.log --error-logfile logs/error.log"
    environment:
      DEBUG: 'False'
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DB_ENGINE: 'django.db.backends.postgresql'
      DB_NAME: ${DB_NAME:logistics}
      DB_USER: ${DB_USER:postgres}
      DB_PASSWORD: ${DB_PASSWORD:postgres}
      DB_HOST: 'db'
      DB_PORT: '5432'
      DB_SCHEMA: ${DB_SCHEMA:logistics}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    restart: always
    expose:
      - 8000

  nginx:
    image: nginx:alpine
    container_name: logistics-nginx-prod
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
    depends_on:
      - web
    restart: always

volumes:
  postgres_data_prod:
